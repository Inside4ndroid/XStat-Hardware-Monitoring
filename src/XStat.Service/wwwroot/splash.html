<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' file: http: data:">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 200px;
    height: 400px;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .card {
    width: 100%;
    height: 100%;
    background: #0f0f11;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
  }
  .title {
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .spinner {
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #a855f7);
    animation: pulse 0.75s infinite ease-in-out both;
  }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  .dot:nth-child(3) { animation-delay:    0s; }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
    40%           { transform: scale(1);   opacity: 1;   }
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="./logo.png" alt="XStat" />
    <span class="title">XStat</span>
    <div class="spinner">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
